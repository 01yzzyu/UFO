# Model registry for UFO benchmark evaluation.
#
# Each model entry fields:
#   name           : display name (used in result tables)
#   id             : model string passed to the platform
#   provider       : openai | gemini | fal        (how to call it; default openai)
#   group          : proprietary | open_source | unified   (table sectioning)
#   # --- optional, for visual-cue generation on a *different* platform ---
#   image_provider : provider to use for visual cue generation (default = provider)
#   image_id       : model id for visual cue generation (default = id)
#   # --- optional fal argument-schema overrides ---
#   fal_prompt_arg : prompt key for the fal model      (default: prompt)
#   fal_image_arg  : input-image key for the fal model (default: image_url)
#   fal_multi_image: true if the fal model takes a list of image urls
#
# API keys come from the environment ONLY (never commit keys):
#   OPENROUTER_API_KEY / OPENAI_API_KEY   for provider: openai
#   GEMINI_API_KEY / GOOGLE_API_KEY       for provider: gemini
#   FAL_KEY                               for provider: fal

# Default OpenAI-compatible endpoint.
base_url: https://openrouter.ai/api/v1

# Judge model (OpenAI-compatible) for open-ended answers and cue quality.
judge_model: openai/gpt-5.1
judge_provider: openai

models:
  # ---- Proprietary (chat VLMs via OpenRouter) ----
  - {name: GPT-5.1,          id: openai/gpt-5.1,                                group: proprietary, provider: openai}
  - {name: GPT-4o,           id: openai/gpt-4o,                                 group: proprietary, provider: openai}
  - {name: Gemini-2.5-Pro,   id: google/gemini-2.5-pro,                         group: proprietary, provider: openai}
  - {name: Gemini-3-Flash,   id: google/gemini-3-flash-preview,                 group: proprietary, provider: openai}

  # Gemini native image generation (returns text + inline image in one call).
  # Use provider: gemini when you want the model itself to synthesize cues.
  - {name: Gemini-2.5-Flash-Image, id: gemini-2.5-flash-image, group: proprietary, provider: gemini}

  # ---- Open-source chat VLMs (via OpenRouter) ----
  - {name: Qwen2.5-VL-72B,   id: qwen/qwen2.5-vl-72b-instruct,                  group: open_source, provider: openai}
  - {name: Qwen3-VL-8B,      id: qwen/qwen3-vl-8b-instruct,                     group: open_source, provider: openai}
  - {name: Qwen3-VL-235B-A22B, id: qwen/qwen3-vl-235b-a22b-instruct,            group: open_source, provider: openai}
  - {name: Gemma-3-27B,      id: google/gemma-3-27b-it,                         group: open_source, provider: openai}

  # ---- Unified Foundation Models (UFMs) — LOCAL GPU deployment ----
  # These are NOT chat-API models. Deploy each from its official repo on a GPU:
  #   1) git clone the official repo and install its requirements
  #   2) download the weights
  #   3) export PYTHONPATH=/path/to/repo so the adapter can import it
  #   4) set model_path below to the weights location
  # No API key is needed. See ufo_bench/providers/local/<adapter>.py for details.
  #
  # Faithful drafts (based on official repos; verify on a GPU machine):
  - {name: Bagel,     group: unified, provider: local, local_adapter: bagel,
     model_path: models/BAGEL-7B-MoT}
  - {name: Janus-Pro, group: unified, provider: local, local_adapter: janus_pro,
     model_path: deepseek-ai/Janus-Pro-7B}
  - {name: EMU3,      group: unified, provider: local, local_adapter: emu3,
     model_path: BAAI/Emu3-Chat, gen_model_path: BAAI/Emu3-Gen,
     vq_path: BAAI/Emu3-VisionTokenizer}
  - {name: OmniGen2,  group: unified, provider: local, local_adapter: omnigen2,
     model_path: OmniGen2/OmniGen2}
  - {name: Ovis-U1,   group: unified, provider: local, local_adapter: ovis_u1,
     model_path: AIDC-AI/Ovis-U1-3B}
  - {name: UniPic2-Metaquery, group: unified, provider: local, local_adapter: unipic2,
     model_path: Skywork/UniPic2-Metaquery-9B, lmm_path: Qwen/Qwen2.5-VL-7B-Instruct}
  - {name: UniCoT,    group: unified, provider: local, local_adapter: unicot,
     model_path: models/UniCoT-7B-MoT}
  - {name: Omni-R1,   group: unified, provider: local, local_adapter: omni_r1,
     model_path: ModalityDance/Omni-R1,
     und_mode: text-only, gen_mode: interleaved-text-image}
  - {name: UniPic1,   group: unified, provider: local, local_adapter: unipic1,
     model_path: Skywork/Skywork-UniPic-1.5B,
     config_path: configs/models/qwen2_5_1_5b_kl16_mar_h.py,
     checkpoint: checkpoint/pytorch_model.bin, image_size: 1024}
  # Scaffold to complete from the repo (raises NotImplementedError until ported):
  - {name: UniWorld-V1, group: unified, provider: local, local_adapter: uniworld_v1,
     model_path: LanguageBind/UniWorld-V1, flux_path: "", siglip_path: ""}

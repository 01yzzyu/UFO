# Config-driven evaluation. Run with:
#   ufo-eval run --run-config configs/run.yaml
# Any CLI flag (e.g. --limit 10) overrides the value here.

source: yzzyu/UFO          # local .jsonl path OR HF repo id
split: mcq                 # mcq | open
models:                    # display names from models.yaml, or "all",
  - GPT-5.1                #   or "group:proprietary|open_source|unified"
  - Qwen3-VL-8B
protocols: [direct, textual, visual, joint]
limit: 30                  # 0 = full dataset
num_threads: 8
out: outputs/run
# judge_model: openai/gpt-5.1   # for open-ended scoring (defaults from models.yaml)
